# ============================================================
# Hugo 博客自动部署到 GitHub Pages
# 每次 push 到 main 分支自动触发
# ============================================================

name: Deploy Hugo Site

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 赋予 GITHUB_TOKEN 写入权限
    permissions:
      contents: write

    steps:
      # 1. 检出代码
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 安装 Hugo Extended
      - name: ⚙️ Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # 3. 构建站点（minify 压缩 HTML/JS/CSS）
      - name: 🔨 Build
        run: hugo --minify

      # 4. 部署到 gh-pages 分支
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          # 保留提交历史（可选）
          force_orphan: true
