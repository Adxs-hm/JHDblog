# ============================================================
# JHD Blog · 质量门禁 + 自动部署
# push main → 验证 → 构建 → 部署
# ============================================================

name: Deploy Hugo Site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 阶段 1：构建验证 ──
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: 🔍 Hugo Build Check
        run: hugo --minify

      - name: 📏 HTML Size Check
        run: |
          SIZE=$(du -sb public/ | cut -f1)
          if [ $SIZE -gt 50000000 ]; then echo "BUILD TOO LARGE: $SIZE bytes"; exit 1; fi
          echo "Build size: $((SIZE / 1024)) KB"

  # ── 阶段 2：部署 ──
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: 🔨 Build
        run: hugo --minify

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
