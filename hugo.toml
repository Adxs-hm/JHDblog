baseURL = "https://adxs-hm.github.io/JHDblog/"
theme = "PaperMod"
title = "JHD"

hasCJKLanguage = true
enableEmoji = true
enableRobotsTXT = true
mainSections = ["posts"]

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  description = "记录每一个完成的成品 · 在星轨中留下足迹"
  author = "JHD"
  images = ["images/planet-avatar.svg"]
  defaultTheme = "dark"

  [params.assets]
    favicon = "/images/planet-avatar.svg"
    favicon16x16 = "/images/planet-avatar.svg"
    favicon32x32 = "/images/planet-avatar.svg"
    apple_touch_icon = "/images/planet-avatar.svg"
    theme_color = "#0a0c1e"
  dateFormat = "2006-01-02"
  ShowReadingTime = true
  ShowWordCount = true
  ShowToc = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowShareButtons = true
  ShowPageNums = true
  ShowRelatedPosts = true
  disableSpecial1stPost = false

  # 首页：content/_index.md 的自定义 Hero HTML 通过 list.html 的 .Content 渲染
  # 文章列表紧随其后（由 PaperMod list.html 控制）

  # giscus 评论 — 填入 categoryId 后把 comments 改为 true
  comments = true
  [params.giscus]
    repo = "Adxs-hm/JHDblog"
    repoId = "R_kgDOTJEk0w"
    category = "Announcements"
    categoryId = "DIC_kwDOTJEk084DAqTy"

  # Webmention (去 webmention.io 用 GitHub 登录后即生效)
  webmention = "adxs-hm.github.io_jhdblog_"

  # 社交图标
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Adxs-hm"

  [params.fuseOpts]
    isCaseSensitive = false
    distance = 1000
    threshold = 0.3
    minMatchCharLength = 2
    keys = ["title", "permalink", "summary", "content"]

  [params.label]
    text = "JHD"

[[menu.main]]
  name = "文章"
  url = "posts"
  weight = 1
[[menu.main]]
  name = "项目"
  url = "projects"
  weight = 2
[[menu.main]]
  name = "里程碑"
  url = "milestones"
  weight = 3
[[menu.main]]
  name = "关于"
  url = "about"
  weight = 4
[[menu.main]]
  name = "搜索"
  url = "search"
  weight = 5

[languages.zh-cn]
  label = "简体中文"
  weight = 1
  [languages.zh-cn.taxonomies]
    category = "categories"
    tag = "tags"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    tabWidth = 4
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# RSS 全文 — PaperMod 默认输出全文，无需额外配置
