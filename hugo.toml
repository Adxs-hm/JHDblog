baseURL = "https://adxs-hm.github.io/JHDblog/"
theme = "PaperMod"
title = "JHD"

hasCJKLanguage = true
enableEmoji = true
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  description = "记录每一个完成的成品 · 在星轨中留下足迹"
  author = "JHD"
  defaultTheme = "dark"
  dateFormat = "2006-01-02"
  ShowReadingTime = true
  ShowWordCount = true
  ShowToc = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowShareButtons = false
  ShowPageNums = true

  [params.profileMode]
    enabled = true
    title = "JHD"
    subtitle = "记录每一个完成的成品 · 在星轨中留下足迹"
    imageUrl = "images/planet-avatar.svg"
    imageWidth = 140
    imageHeight = 140
    [[params.profileMode.buttons]]
      name = "文章"
      url = "articles"
    [[params.profileMode.buttons]]
      name = "项目"
      url = "projects"
    [[params.profileMode.buttons]]
      name = "关于"
      url = "about"

  # giscus 评论 — 在 GitHub 开启 Discussions 后填入
  comments = false
  # [params.giscus]
  #   repo = "Adxs-hm/JHDblog"
  #   repoId = ""
  #   category = "Announcements"
  #   categoryId = ""

  # 社交图标
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Adxs-hm"

  [params.fuseOpts]
    isCaseSensitive = false
    distance = 1000
    threshold = 0.3
    minMatchCharLength = 2
    keys = ["title", "permalink", "summary", "content"]

  [params.label]
    text = "JHD"

[[menu.main]]
  name = "文章"
  url = "articles"
  weight = 1
[[menu.main]]
  name = "项目"
  url = "projects"
  weight = 2
[[menu.main]]
  name = "里程碑"
  url = "milestones"
  weight = 3
[[menu.main]]
  name = "关于"
  url = "about"
  weight = 4
[[menu.main]]
  name = "搜索"
  url = "search"
  weight = 5

[languages.zh-cn]
  languageName = "简体中文"
  weight = 1
  [languages.zh-cn.taxonomies]
    category = "categories"
    tag = "tags"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
