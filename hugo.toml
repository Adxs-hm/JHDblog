# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
# JHD 站点 · 星空行星主题 · Hugo + LoveIt
# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=

baseURL = "https://Adxs-hm.github.io/"
theme = "LoveIt"

# 网站标题
title = "JHD"

# 语言设置
defaultContentLanguage = "zh-cn"
locale = "zh-CN"
hasCJKLanguage = true
copyright = ""

# 基础功能
enableRobotsTXT = true
enableEmoji = true
ignoreErrors = ["error-remote-getjson", "error-missing-instagram-accesstoken"]

# 分页
[pagination]
  disableAliases = false
  pagerSize = 10
  path = "page"

# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
# 导航菜单
# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
[menu]
  [[menu.main]]
    weight = 1
    identifier = "projects"
    name = "项目"
    url = "/projects/"
    title = "所有项目记录"
  [[menu.main]]
    weight = 2
    identifier = "milestones"
    name = "里程碑"
    url = "/milestones/"
    title = "关键节点与里程碑"
  [[menu.main]]
    weight = 3
    identifier = "about"
    name = "关于"
    url = "/about/"
    title = "关于 JHD"

# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
# 全局参数
# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
[params]
  defaultTheme = "dark"
  dateFormat = "2006-01-02"
  title = "JHD"
  description = "记录每一个完成的成品"
  images = ["/images/planet-avatar.svg"]

  # 作者信息
  [params.author]
    name = "JHD"
    email = ""
    link = ""

  # 头部导航栏
  [params.header]
    desktopMode = "fixed"
    mobileMode = "auto"
    [params.header.title]
      logo = ""
      name = "JHD"
      pre = "<span class='planet-icon'>🪐</span>"
      post = ""
      typeit = false

  # 页脚
  [params.footer]
    enable = true
    custom = ""
    hugo = true
    copyright = true
    author = true
    since = 2026
    icp = ""
    license = ""

  # 文章列表
  [params.section]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  [params.list]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  # 应用图标
  [params.app]
    title = "JHD"
    noFavicon = false
    svgFavicon = ""
    themeColor = "#0a0a1a"
    iconColor = "#e9b847"
    tileColor = "#0d0d2b"

  # 搜索
  [params.search]
    enable = true
    type = "fuse"
    contentLength = 4000
    placeholder = "搜索记录..."
    maxResultLength = 10
    snippetLength = 30
    highlightTag = "em"
    absoluteURL = false
    [params.search.fuse]
      isCaseSensitive = false
      minMatchCharLength = 2
      findAllMatches = false
      location = 0
      threshold = 0.3
      distance = 100
      ignoreLocation = false

  # 首页配置
  [params.home]
    rss = 10
    [params.home.profile]
      enable = true
      gravatarEmail = ""
      avatarURL = "/images/planet-avatar.svg"
      title = "JHD"
      subtitle = "记录每一个完成的成品 · 在星轨中留下足迹"
      typeit = true
      social = true
      disclaimer = ""
    [params.home.posts]
      enable = true
      paginate = 6

  # 社交链接
  [params.social]
    GitHub = "Adxs-hm"
    Email = ""
    RSS = true

  # 文章页面配置
  [params.page]
    hiddenFromHomePage = false
    hiddenFromSearch = false
    twemoji = false
    lightgallery = true
    ruby = true
    fraction = true
    fontawesome = true
    linkToMarkdown = true
    rssFullText = false
    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
    [params.page.code]
      copy = true
      maxShownLines = 50
      [params.page.code.render]
        goat = true
        mermaid = true
    [params.page.math]
      enable = false
    [params.page.share]
      enable = true
      X = true
      Facebook = true
      Linkedin = true
      Weibo = true
      Telegram = true
    [params.page.comment]
      enable = false

  # 打字机动画
  [params.typeit]
    speed = 80
    cursorSpeed = 1000
    cursorChar = "|"
    duration = -1

  # SEO
  [params.seo]
    image = "/images/planet-avatar.svg"
    thumbnailUrl = "/images/planet-avatar.svg"

  # CDN
  [params.cdn]
    data = ""

  # 自定义 CSS（星空主题）
  [params.page.library]
    [params.page.library.css]
      spaceTheme = "css/space-theme.css"

  [params.cookieconsent]
    enable = false

# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
# Markdown 解析
# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 6

# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
# 站点地图
# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
# 文章 URL
# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
[permalinks]
  posts = ":contentbasename"

# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
# 输出格式
# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]

# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
# 中文语言配置
# -=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=
[languages]
  [languages.zh-cn]
    weight = 1
    locale = "zh-CN"
    label = "简体中文"
    hasCJKLanguage = true
    copyright = ""
