<script>
/* ═══════ 注入流星 + 渐晕到 body（星空由 CSS 伪元素处理） ═══════ */
(function(){
  var s1=document.createElement('div');s1.className='shooting-star';document.body.appendChild(s1);
  var s2=document.createElement('div');s2.className='shooting-star';document.body.appendChild(s2);
  var v=document.createElement('div');v.className='vignette';document.body.appendChild(v);
})();

/* ═══════ 卡片光影追踪 ═══════ */
document.querySelectorAll('.post-entry,.first-entry').forEach(function(card){
  card.addEventListener('mousemove',function(e){
    var r=card.getBoundingClientRect();
    card.style.setProperty('--mx',((e.clientX-r.left)/r.width*100).toFixed(0)+'%');
    card.style.setProperty('--my',((e.clientY-r.top)/r.height*100).toFixed(0)+'%');
    card.classList.add('glow-active');
  });
  card.addEventListener('mouseleave',function(){card.classList.remove('glow-active')});
});

/* ═══════ 滚动入场 ═══════ */
var observer=new IntersectionObserver(function(entries){
  entries.forEach(function(e){if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)';observer.unobserve(e.target)}});
},{threshold:.12});
document.querySelectorAll('.post-content h2,.post-content h3,.post-content blockquote,.post-content pre,.post-content table').forEach(function(el){
  el.style.opacity='0';el.style.transform='translateY(16px)';el.style.transition='opacity .6s ease,transform .6s ease';observer.observe(el);
});
</script>

{{- /* Webmention */ -}}
{{- with .Site.Params.webmention }}
<div class="webmentions" style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border-subtle);"></div>
<script>
(function(){
  var wm=document.querySelector('.webmentions');if(!wm)return;
  fetch('https://webmention.io/api/mentions.jf2?target='+encodeURIComponent(location.href)+'&per-page=20')
    .then(function(r){return r.json()}).then(function(d){
      if(!d.children||!d.children.length){wm.style.display='none';return}
      var h='<h3 style="font-size:1rem;color:var(--gold);margin-bottom:.8rem">Mastodon 互动</h3>';
      d.children.forEach(function(m){
        var a=m.author&&m.author.photo?'<img src="'+m.author.photo+'" style="width:28px;height:28px;border-radius:50%;flex-shrink:0" loading="lazy">':'';
        var n=m.author&&m.author.name?m.author.name:'匿名';
        var t=m['wm-property']==='in-reply-to'?'回复':m['wm-property']==='like-of'?'点赞':m['wm-property']==='repost-of'?'转发':'提及';
        var txt=m.content&&m.content.text?m.content.text.substring(0,150):'';
        h+='<div style="display:flex;align-items:flex-start;gap:.6rem;padding:.5rem 0;font-size:.85rem;border-bottom:1px solid var(--border-subtle)">'+a+'<div><strong style="color:var(--primary)">'+n+'</strong> <span style="color:var(--text-muted)">'+t+'</span>'+(txt?'<p style="margin:.2rem 0 0;color:var(--text-body)">'+txt+'</p>':'')+'</div></div>';
      });
      wm.innerHTML=h;
    }).catch(function(){wm.style.display='none'});
})();
</script>
{{- end }}
