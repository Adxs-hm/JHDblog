<!-- Skip-to-content 无障碍链接 -->
<a class="skip-link" href="#main-content">跳到内容</a>

<script>
/* ═══════ 注入深空天体 + main-content id ═══════ */
(function(){
  var main=document.querySelector('main.main');if(main)main.id='main-content';
  var els=[
    {c:'galaxy-core'},
    {c:'nebula'},
    {c:'shooting-star'},{c:'shooting-star'},{c:'shooting-star'},
    {c:'vignette'},
    {c:'celestial-sun'},
    {c:'celestial-blackhole'},
    {c:'celestial-planet'}
  ];
  els.forEach(function(e){
    var d=document.createElement('div');d.className=e.c;document.body.appendChild(d);
  });
})();

/* ═══════ 卡片光影追踪 ═══════ */
document.querySelectorAll('.post-entry,.first-entry').forEach(function(card){
  card.addEventListener('mousemove',function(e){
    var r=card.getBoundingClientRect();
    card.style.setProperty('--mx',((e.clientX-r.left)/r.width*100).toFixed(0)+'%');
    card.style.setProperty('--my',((e.clientY-r.top)/r.height*100).toFixed(0)+'%');
    card.classList.add('glow-active');
  });
  card.addEventListener('mouseleave',function(){card.classList.remove('glow-active')});
});

/* ═══════ 键盘快捷键: Ctrl+K 聚焦搜索 ═══════ */
document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();
    var s=document.getElementById('searchInput');if(s){s.focus();s.select()}else{location.href='{{ "search" | relURL }}'}
  }
});

/* ═══════ TOC 滚动跟踪 + 高亮 ═══════ */
(function(){
  var toc=document.querySelector('.post-single details.toc');
  if(!toc)return;
  var links=toc.querySelectorAll('a[href^="#"]');
  if(!links.length)return;
  var headings=[];
  links.forEach(function(a){
    var el=document.getElementById(a.getAttribute('href').slice(1));
    if(el)headings.push({el:el,link:a});
  });
  if(!headings.length)return;
  var activeLink=null;
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        if(activeLink)activeLink.classList.remove('toc-active');
        var h=headings.find(function(x){return x.el===e.target});
        if(h){h.link.classList.add('toc-active');activeLink=h.link;
          h.link.scrollIntoView({block:'nearest',behavior:'smooth'})}
      }
    });
  },{rootMargin:'-80px 0px -70% 0px',threshold:0});
  headings.forEach(function(h){obs.observe(h.el)});
})();

/* ═══════ 滚动入场 ═══════ */
var observer=new IntersectionObserver(function(entries){
  entries.forEach(function(e){if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)';observer.unobserve(e.target)}});
},{threshold:.12});
document.querySelectorAll('.post-content h2,.post-content h3,.post-content blockquote,.post-content pre,.post-content table').forEach(function(el){
  el.style.opacity='0';el.style.transform='translateY(16px)';el.style.transition='opacity .6s ease,transform .6s ease';observer.observe(el);
});
</script>

{{- /* Webmention */ -}}
{{- with .Site.Params.webmention }}
<div class="webmentions" style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border-subtle);"></div>
<script>
(function(){
  var wm=document.querySelector('.webmentions');if(!wm)return;
  fetch('https://webmention.io/api/mentions.jf2?target='+encodeURIComponent(location.href)+'&per-page=20')
    .then(function(r){return r.json()}).then(function(d){
      if(!d.children||!d.children.length){wm.style.display='none';return}
      var likes=d.children.filter(function(m){return m['wm-property']==='like-of'});
      var replies=d.children.filter(function(m){return m['wm-property']==='in-reply-to'||m['wm-property']==='mention-of'});
      var h='';
      if(likes.length){
        h+='<div style="margin-bottom:1.2rem"><span style="font-size:.85rem;color:var(--gold);font-weight:600">❤️ '+likes.length+' 个点赞</span>';
        h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:.4rem">';
        likes.forEach(function(m){
          var p=m.author&&m.author.photo?m.author.photo:'';
          var n=m.author&&m.author.name?m.author.name:'';
          h+=p?'<img src="'+p+'" alt="'+n+'" title="'+n+'" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border-subtle)" loading="lazy">':'';
        });
        h+='</div></div>';
      }
      if(replies.length){
        h+='<span style="font-size:.85rem;color:var(--gold);font-weight:600">💬 '+replies.length+' 条回复</span>';
        replies.forEach(function(m){
          var a=m.author&&m.author.photo?'<img src="'+m.author.photo+'" style="width:28px;height:28px;border-radius:50%;flex-shrink:0" loading="lazy">':'';
          var n=m.author&&m.author.name?m.author.name:'匿名';
          var txt=m.content&&m.content.text?m.content.text.substring(0,200):'';
          h+='<div style="display:flex;align-items:flex-start;gap:.6rem;padding:.5rem 0;font-size:.85rem;border-bottom:1px solid var(--border-subtle)">'+a+'<div><strong style="color:var(--text-main)">'+n+'</strong>'+(txt?'<p style="margin:.2rem 0 0;color:var(--text-body)">'+txt+'</p>':'')+'</div></div>';
        });
      }
      wm.innerHTML=h;
    }).catch(function(){wm.style.display='none'});
})();
</script>
{{- end }}
