<script>
/* JHD 交互特效 — 卡片光影 + 滚动入场 + 目录高亮 */
(function() {
  'use strict';

  /* 卡片光影追随 */
  document.addEventListener('mousemove', function(e) {
    document.querySelectorAll('.post-entry, .first-entry').forEach(function(card) {
      var rect = card.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var y = e.clientY - rect.top;
      if (x > 0 && y > 0 && x < rect.width && y < rect.height) {
        card.style.setProperty('--glow-x', (x / rect.width * 100).toFixed(0) + '%');
        card.style.setProperty('--glow-y', (y / rect.height * 100).toFixed(0) + '%');
      }
    });
  });

  /* 滚动入场 */
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.style.opacity = '1';
        entry.target.style.transform = 'translateY(0)';
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.post-content h2, .post-content h3, .post-content blockquote, .post-content pre, .post-content table').forEach(function(el) {
    el.style.opacity = '0';
    el.style.transform = 'translateY(16px)';
    el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
    observer.observe(el);
  });

  /* 回到顶部平滑滚动 */
  var topBtn = document.getElementById('top-link');
  if (topBtn) {
    topBtn.addEventListener('click', function(e) {
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }
})();

/* Webmention 社交互动加载 */
(function() {
  var wm = document.querySelector('.webmentions');
  if (!wm) return;
  var target = encodeURIComponent(window.location.href);
  fetch('https://webmention.io/api/mentions.jf2?target=' + target + '&per-page=20')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.children || !d.children.length) { wm.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">暂无互动</p>'; return; }
      var html = '<h3 style="font-size:1rem;color:var(--text-secondary);margin-bottom:0.8rem;">Mastodon 互动</h3>';
      d.children.forEach(function(m) {
        var avatar = m.author && m.author.photo ? '<img src="'+m.author.photo+'" alt="" style="width:28px;height:28px;border-radius:50%;flex-shrink:0;">' : '';
        var name = m.author && m.author.name ? m.author.name : '匿名';
        var type = m['wm-property'] === 'in-reply-to' ? '回复' : m['wm-property'] === 'like-of' ? '点赞' : m['wm-property'] === 'repost-of' ? '转发' : '提及';
        var text = m.content && m.content.text ? m.content.text.substring(0, 150) : '';
        html += '<div style="display:flex;align-items:flex-start;gap:0.6rem;padding:0.5rem 0;font-size:0.85rem;border-bottom:1px solid var(--border-subtle);">'+avatar+'<div><strong style="color:var(--primary);">'+name+'</strong> <span style="color:var(--text-muted);">'+type+'</span>'+ (text ? '<p style="margin:0.2rem 0 0;color:var(--text-body);">'+text+'</p>' : '') +'</div></div>';
      });
      wm.innerHTML = html;
    })
    .catch(function() { wm.innerHTML = ''; });
})();
</script>
