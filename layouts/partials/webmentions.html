{{- /* Webmention 社交互动 (IndieWeb) */ -}}
{{- with .Site.Params.webmention -}}
<div id="webmentions" class="webmentions" style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-subtle);">
  <h3 style="font-size: 1rem; color: var(--text-secondary); margin-bottom: 1rem;">💬 互动</h3>
  <div id="wm-loading" style="color: var(--text-secondary); font-size: 0.85rem;">加载中...</div>
  <div id="wm-list" style="display: flex; flex-direction: column; gap: 0.8rem;"></div>
</div>
<script>
(function() {
  var container = document.getElementById('wm-list');
  var loading = document.getElementById('wm-loading');
  if (!container) return;
  var target = encodeURIComponent(window.location.href);
  fetch('https://webmention.io/api/mentions.jf2?target=' + target + '&per-page=20')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.children || !data.children.length) {
        if (loading) loading.textContent = '暂无互动';
        return;
      }
      if (loading) loading.style.display = 'none';
      data.children.forEach(function(m) {
        var card = document.createElement('div');
        card.style.cssText = 'display:flex;align-items:flex-start;gap:0.75rem;padding:0.6rem 0;font-size:0.85rem;';
        var avatar = m.author && m.author.photo ? '<img src="' + m.author.photo + '" alt="" style="width:32px;height:32px;border-radius:50%;flex-shrink:0;">' : '';
        var name = m.author && m.author.name ? '<a href="' + (m.author.url || '#') + '" style="color:var(--gold);font-weight:600;text-decoration:none;">' + m.author.name + '</a>' : '匿名';
        var type = m['wm-property'] === 'in-reply-to' ? '回复' : m['wm-property'] === 'like-of' ? '点赞' : m['wm-property'] === 'repost-of' ? '转发' : '提及';
        var content = m.content && m.content.text ? '<p style="margin:0.2rem 0 0;color:var(--text-body);">' + m.content.text.substring(0, 200) + '</p>' : '';
        card.innerHTML = avatar + '<div>' + name + ' <span style="color:var(--text-secondary);">' + type + '</span>' + content + '</div>';
        container.appendChild(card);
      });
    })
    .catch(function() { if (loading) loading.textContent = '互动加载失败'; });
})();
</script>
{{- end -}}
