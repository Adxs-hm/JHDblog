<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 行星本体渐变 -->
    <radialGradient id="planetGrad" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#4a9ef7"/>
      <stop offset="30%" stop-color="#2d6bc9"/>
      <stop offset="70%" stop-color="#1a3f7a"/>
      <stop offset="100%" stop-color="#0d1f40"/>
    </radialGradient>

    <!-- 光晕渐变 -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(100,160,255,0)" />
      <stop offset="60%" stop-color="rgba(100,160,255,0.08)" />
      <stop offset="100%" stop-color="rgba(100,160,255,0.2)" />
    </radialGradient>

    <!-- 大气层渐变 -->
    <radialGradient id="atmoGrad" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="rgba(100,180,255,0)" />
      <stop offset="95%" stop-color="rgba(100,180,255,0.3)" />
      <stop offset="100%" stop-color="rgba(100,180,255,0.6)" />
    </radialGradient>

    <!-- 行星环渐变 -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(233,184,71,0)" />
      <stop offset="15%" stop-color="rgba(233,184,71,0.6)" />
      <stop offset="50%" stop-color="rgba(245,215,140,0.8)" />
      <stop offset="85%" stop-color="rgba(233,184,71,0.6)" />
      <stop offset="100%" stop-color="rgba(233,184,71,0)" />
    </linearGradient>

    <!-- 星点滤镜 -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 行星发光 -->
    <filter id="planetGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 外发光 -->
  <circle cx="100" cy="100" r="95" fill="url(#glowGrad)">
    <animate attributeName="r" values="93;98;93" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- 行星环（后层） -->
  <g transform="translate(100,100) rotate(-20)">
    <ellipse cx="0" cy="0" rx="78" ry="18" fill="none" stroke="url(#ringGrad)" stroke-width="6" opacity="0.5"
      stroke-dasharray="260 30">
      <animateTransform attributeName="transform" type="rotate" from="-20" to="340" dur="30s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- 行星本体 -->
  <circle cx="100" cy="100" r="55" fill="url(#planetGrad)" filter="url(#planetGlow)">
    <animate attributeName="r" values="55;56;55" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- 表面纹理 -->
  <g opacity="0.2">
    <ellipse cx="80" cy="85" rx="25" ry="12" fill="#6ab4ff" transform="rotate(-15,80,85)"/>
    <ellipse cx="110" cy="110" rx="20" ry="8" fill="#3a7adf" transform="rotate(10,110,110)"/>
    <ellipse cx="90" cy="105" rx="12" ry="6" fill="#8cc8ff" transform="rotate(-8,90,105)"/>
    <circle cx="75" cy="95" r="3" fill="#a0d0ff"/>
    <circle cx="115" cy="90" r="4" fill="#a0d0ff"/>
    <circle cx="95" cy="75" r="2" fill="#c0e0ff"/>
  </g>

  <!-- 大气层边缘 -->
  <circle cx="100" cy="100" r="56" fill="url(#atmoGrad)"/>

  <!-- 行星环（前层） -->
  <g transform="translate(100,100)">
    <ellipse cx="0" cy="0" rx="78" ry="18" fill="none" stroke="url(#ringGrad)" stroke-width="5" opacity="0.7"
      clip-path="url(#ringFront)">
      <animateTransform attributeName="transform" type="rotate" from="-20" to="340" dur="30s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <clipPath id="ringFront">
    <rect x="0" y="0" width="200" height="200"/>
  </clipPath>

  <!-- 高光点 -->
  <circle cx="82" cy="82" r="12" fill="rgba(255,255,255,0.15)">
    <animate attributeName="opacity" values="0.15;0.22;0.15" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- 背景星点 -->
  <g filter="url(#starGlow)">
    <circle cx="30" cy="35" r="1.5" fill="#fff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="165" cy="45" r="1" fill="#fff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="160" r="1.2" fill="#fff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="155" r="1.5" fill="#fff" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="100" r="1" fill="#fff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="175" cy="100" r="1.3" fill="#fff" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
